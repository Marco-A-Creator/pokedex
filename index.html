<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="shortcut icon" href="./assets/icons/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="./styles/variables.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/pokemonsters.css">
    <link rel="stylesheet" href="./styles/dialog.css">
    <link rel="stylesheet" href="./styles/responsive.css">

    <script src="./scripts/templates.js" defer></script>
    <script src="./scripts/dialog.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body onload="init()">

    <header class="header">
        <img src="./assets/images/pokeball_standard_metalic.webp" alt="Pokéball" class="pokeball-icon">

        <div class="logo">
            <h1>Pokédex</h1>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Pokémon suchen..." oninput="searchPokemon()">
        </div>

    </header>

    <main id="content">
        <!-- Suchnachricht wenn kein Ergebnis gefunden wurde -->
        <p id="not-found" class="search-message d-none">
            Kein Pokémon gefunden.
        </p>

        <!-- Pokémon Karten -->
        <section id="card" class="pokemon-container">
        </section>

        <!-- Ladebutton -->
        <div class="load-more-container">
            <button id="load-more-button" onclick="loadMorePokemon()">
                Mehr laden
            </button>
        </div>
    </main>

    <!-- Overlay -->
    <div id="overlay" class="overlay d-none" onclick="closeDialog()">

        <div id="dialog" class="dialog" onclick="event.stopPropagation()">

            <!-- Schließen -->
            <button id="close-dialog-button" class="close-btn" onclick="closeDialog()">
                ✕
            </button>

            <!-- Vorheriges Pokémon -->
            <button id="prev-button" class="nav-btn left" onclick="showPreviousPokemon()">
                &#10094;
            </button>

            <!-- Inhalt -->
            <div id="dialogContent">

            </div>

            <!-- Nächstes Pokémon -->
            <button id="next-button" class="nav-btn right" onclick="showNextPokemon()">
                &#10095;
            </button>

        </div>

    </div>

    <footer>
        <p>&copy; 2026 Pokédex</p>
        <div>
            <a href="#">Impressum</a>
            <a href="#">Datenschutz</a>
        </div>
    </footer>
</body>

</html>
